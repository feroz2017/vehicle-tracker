version: "3.9"

services:
  # ── Frontend ─────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 5173:80 # expose locally for debugging; remove in prod
    environment:
      - VITE_API_URL=http://fastapi:8000
      - VITE_WS_URL=ws://fastapi:8000


  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"          # expose locally for debugging; remove in prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI (application layer) ───────────────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    # Serve the reference-frontend so the app is self-contained
    volumes:
      - ./reference-frontend:/app/../reference-frontend:ro

  # ── Worker (ingestion layer — polls Waltti every 30 s) ────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ingestion.worker"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── GTFS loader (static schedule — refreshes nightly) ────────────────────────
  # Loads schedule on startup, then APScheduler fires again every night at
  # 01:30 EET (30 min after Waltti publishes the new ZIP at 01:00 EET).
  # timezone="Europe/Helsinki" handles DST automatically.
  gtfs-loader:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ingestion.gtfs_loader"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
